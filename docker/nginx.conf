# To jest plik /etc/nginx/conf.d/default.conf
# Tylko konfiguracja serwera, BEZ dyrektyw env!

map $BACKEND_HOST $backend_host {
  "" backend;
  default $BACKEND_HOST;
}

map $BACKEND_PORT $backend_port {
  "" 5000;
  default $BACKEND_PORT;
}

map $BACKEND_PROTOCOL $backend_protocol {
  "" http;
  default $BACKEND_PROTOCOL;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass $backend_protocol://$backend_host:$backend_port/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $backend_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    
    proxy_ssl_server_name on;
    proxy_ssl_protocols TLSv1.2 TLSv1.3;
  }
}